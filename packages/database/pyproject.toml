[project]
name = "acp-database"
version = "0.1.0"
description = "Modèles SQLAlchemy et accès base de l'Agent Company Platform"
requires-python = ">=3.11"
dependencies = ["sqlalchemy>=2.0", "acp-contracts"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
