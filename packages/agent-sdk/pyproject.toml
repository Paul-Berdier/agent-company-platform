[project]
name = "acp-agent-sdk"
version = "0.1.0"
description = "Définitions d'agents logiques, rôles et capacités (chargés depuis les modules)"
requires-python = ">=3.11"
dependencies = ["pydantic>=2.7", "acp-contracts"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
